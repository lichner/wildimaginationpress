{% assign share_url = page.url | absolute_url | url_encode %}
{% assign share_title = page.title | url_encode %}
{% assign share_description = page.description | default: page.excerpt | strip_html | truncate: 160 | url_encode %}

<div class="share-buttons" aria-label="Share this page">
  <span class="share-label">Share</span>
  <a href="https://www.facebook.com/sharer/sharer.php?u={{ share_url }}&quote={{ share_title }}"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Share on Facebook"
     class="share-btn share-facebook">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
  </a>
  <a href="https://x.com/intent/tweet?url={{ share_url }}&text={{ share_title }}"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Share on X"
     class="share-btn share-x">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </a>
  <a href="https://pinterest.com/pin/create/button/?url={{ share_url }}&description={{ share_title }}"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Share on Pinterest"
     class="share-btn share-pinterest">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.631-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12.017 24c6.624 0 11.99-5.367 11.99-11.988C24.007 5.367 18.641 0 12.017 0z"/></svg>
  </a>
  <button type="button"
          aria-label="Copy link"
          class="share-btn share-copy"
          data-url="{{ page.url | absolute_url }}"
          onclick="navigator.clipboard.writeText(this.dataset.url).then(function(){var b=event.currentTarget;b.classList.add('copied');b.querySelector('.copy-icon').style.display='none';b.querySelector('.check-icon').style.display='block';setTimeout(function(){b.classList.remove('copied');b.querySelector('.copy-icon').style.display='';b.querySelector('.check-icon').style.display='';},2000)})">
    <svg class="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    <svg class="check-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
  </button>
  <a href="mailto:?subject={{ share_title }}&body={{ share_description }}%0A%0A{{ share_url }}"
     aria-label="Share via email"
     class="share-btn share-email">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67z"/><path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908z"/></svg>
  </a>
</div>
